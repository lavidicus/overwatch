# CertForge Intermediate CA OpenSSL Configuration
# For online intermediate CA server

[ ca ]
default_ca = CA_default

[ CA_default ]
dir               = /etc/pki/certforge/intermediate
certs             = $dir/certs
crl_dir           = $dir/crl
new_certs_dir     = $dir/newcerts
database          = $dir/index.txt
serial            = $dir/serial
RANDFILE          = $dir/private/.rand

private_key       = $dir/private/intermediate-ca.key
certificate       = $dir/certs/intermediate-ca.crt
crlnumber         = $dir/crlnumber
crl               = $dir/crl/intermediate-ca.crl
crl_extensions    = crl_ext
default_crl_days  = 7
default_md        = sha256
name_opt          = ca_default
cert_opt          = ca_default
default_days      = 1095
preserve          = no
policy            = policy_loose
copy_extensions   = none

[ policy_loose ]
countryName             = optional
stateOrProvinceName     = optional
localityName            = optional
organizationName        = optional
organizationalUnitName  = optional
commonName              = supplied
emailAddress            = optional

[ req ]
default_keyfile         = /etc/pki/certforge/intermediate/private/intermediate-ca.key
distinguished_name      = req_distinguished_name
string_mask             = utf8only
default_md              = sha256
prompt                  = no

[ req_distinguished_name ]
countryName                     = US
stateOrProvinceName           = California
localityName                  = San Francisco
organizationName              = Your Organization
organizationalUnitName        = IT Security
commonName                    = Your Organization Intermediate CA

[ v3_intermediate_ca ]
subjectKeyIdentifier          = hash
authorityKeyIdentifier        = keyid:always,issuer
basicConstraints              = critical, CA:TRUE, pathlen:0
keyUsage                      = critical, digitalSignature, cRLSign, keyCertSign

[ v3_leaf ]
basicConstraints              = CA:FALSE
nsCertType                    = client, email, objectSigning
nsComment                     = "OpenSSL Generated Certificate"
subjectKeyIdentifier          = hash
authorityKeyIdentifier        = keyid,issuer:always
keyUsage                      = critical, digitalSignature, keyEncipherment
extendedKeyUsage              = clientAuth, emailProtection, serverAuth

[ v3_server ]
basicConstraints              = CA:FALSE
nsCertType                    = server
nsComment                     = "OpenSSL Generated Certificate"
subjectKeyIdentifier          = hash
authorityKeyIdentifier        = keyid,issuer:always
keyUsage                      = critical, digitalSignature, keyEncipherment
extendedKeyUsage              = serverAuth

[ v3_client ]
basicConstraints              = CA:FALSE
nsCertType                    = client
nsComment                     = "OpenSSL Generated Certificate"
subjectKeyIdentifier          = hash
authorityKeyIdentifier        = keyid,issuer:always
keyUsage                      = critical, digitalSignature
extendedKeyUsage              = clientAuth, emailProtection

[ crl_ext ]
authorityKeyIdentifier        = keyid:always

[ ocsp_signing ]
keyUsage                      = critical, digitalSignature
extendedKeyUsage              = critical, OCSPSigning
subjectKeyIdentifier          = hash

[ alt_names ]
DNS.1                         = localhost
DNS.2                         = pki.9xc.io
