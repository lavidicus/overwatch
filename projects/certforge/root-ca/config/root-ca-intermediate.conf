# CertForge Intermediate CA Configuration (used by Root CA)
# For signing intermediate CA certificates

[ ca ]
default_ca = CA_default

[ CA_default ]
dir               = /etc/pki/certforge
certs             = $dir/certs
crl_dir           = $dir/crl
new_certs_dir     = $dir/newcerts
database          = $dir/index.txt
serial            = $dir/serial
RANDFILE          = $dir/private/.rand

private_key       = $dir/private/root-ca.key
certificate       = $dir/certs/root-ca.crt
crlnumber         = $dir/crlnumber
crl               = $dir/crl/root-ca.crl
crl_extensions    = crl_ext
default_crl_days  = 30
default_md        = sha384
name_opt          = ca_default
cert_opt          = ca_default
default_days      = 3650
preserve          = no
policy            = policy_strict
copy_extensions   = none

[ policy_strict ]
countryName             = optional
stateOrProvinceName     = optional
organizationName        = optional
organizationalUnitName  = optional
commonName              = supplied
emailAddress            = optional

[ req ]
default_keyfile         = /etc/pki/certforge/private/root-ca.key
distinguished_name      = req_distinguished_name
x509_extensions         = v3_intermediate_ca
string_mask             = utf8only
default_md              = sha384
prompt                  = no

[ req_distinguished_name ]
countryName                     = US
stateOrProvinceName           = California
localityName                  = San Francisco
organizationName              = Your Organization
organizationalUnitName        = IT Security
commonName                    = Your Organization Intermediate CA

[ v3_intermediate_ca ]
subjectKeyIdentifier          = hash
authorityKeyIdentifier        = keyid:always,issuer
basicConstraints              = critical, CA:TRUE, pathlen:0
keyUsage                      = critical, digitalSignature, cRLSign, keyCertSign

[ crl_ext ]
authorityKeyIdentifier        = keyid:always
