<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <!-- Subtle drop shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#2D2D2D" flood-opacity="0.15"/>
    </filter>
    <!-- Radial gradient for depth on rings -->
    <radialGradient id="ringGrad1" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#3D3D3D"/>
      <stop offset="100%" stop-color="#2D2D2D"/>
    </radialGradient>
    <radialGradient id="ringGrad2" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#6B9E82"/>
      <stop offset="100%" stop-color="#5B8A72"/>
    </radialGradient>
    <radialGradient id="ringGrad3" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#D4B47E"/>
      <stop offset="100%" stop-color="#C9A96E"/>
    </radialGradient>
    <radialGradient id="centerGrad" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#6B9E82"/>
      <stop offset="100%" stop-color="#4A7A62"/>
    </radialGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="200" cy="200" r="195" fill="#F5F0E8" filter="url(#shadow)"/>

  <!-- Target rings (outer to inner) -->
  <!-- Ring 4 - outermost -->
  <circle cx="200" cy="200" r="175" fill="url(#ringGrad1)" opacity="0.9"/>
  <!-- Ring 3 -->
  <circle cx="200" cy="200" r="140" fill="url(#ringGrad2)"/>
  <!-- Ring 2 -->
  <circle cx="200" cy="200" r="105" fill="url(#ringGrad1)" opacity="0.85"/>
  <!-- Ring 1 - inner -->
  <circle cx="200" cy="200" r="70" fill="url(#ringGrad3)"/>
  <!-- Bullseye center -->
  <circle cx="200" cy="200" r="35" fill="url(#centerGrad)"/>

  <!-- Modern handprint (stylized, centered on bullseye) -->
  <g transform="translate(200, 200) scale(0.85)" opacity="0.95">
    <!-- Palm -->
    <ellipse cx="0" cy="15" rx="42" ry="48" fill="#F5F0E8"/>
    <!-- Thumb -->
    <ellipse cx="-42" cy="-15" rx="12" ry="28" fill="#F5F0E8" transform="rotate(30, -42, -15)"/>
    <!-- Index finger -->
    <ellipse cx="-20" cy="-62" rx="10" ry="30" fill="#F5F0E8" transform="rotate(5, -20, -62)"/>
    <!-- Middle finger -->
    <ellipse cx="0" cy="-68" rx="10" ry="34" fill="#F5F0E8"/>
    <!-- Ring finger -->
    <ellipse cx="20" cy="-62" rx="9.5" ry="30" fill="#F5F0E8" transform="rotate(-5, 20, -62)"/>
    <!-- Pinky -->
    <ellipse cx="37" cy="-50" rx="9" ry="25" fill="#F5F0E8" transform="rotate(-12, 37, -50)"/>
  </g>

  <!-- "TARGET" text arc (top) -->
  <defs>
    <path id="topArc" d="M 60,200 A 140,140 0 0,1 340,200" fill="none"/>
    <path id="bottomArc" d="M 340,210 A 140,140 0 0,1 60,210" fill="none"/>
  </defs>
  <text font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="26" fill="#F5F0E8" letter-spacing="8">
    <textPath href="#topArc" startOffset="50%" text-anchor="middle">TARGET</textPath>
  </text>
  <text font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="26" fill="#F5F0E8" letter-spacing="6">
    <textPath href="#bottomArc" startOffset="50%" text-anchor="middle">MASSAGE</textPath>
  </text>
</svg>
