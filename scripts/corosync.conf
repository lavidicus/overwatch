logging {
  debug: off
  to_syslog: yes
}

nodelist {
  node {
    name: pve-1
    nodeid: 1
    quorum_votes: 1
    ring0_addr: 172.16.253.240
  }
  node {
    name: pve-2
    nodeid: 2
    quorum_votes: 1
    ring0_addr: 172.16.253.241
  }
  node {
    name: pve-3
    nodeid: 3
    quorum_votes: 1
    ring0_addr: 172.16.253.242
  }
}

quorum {
  provider: corosync_votequorum
}

totem {
  cluster_name: 9XCLAB
  config_version: 1
  interface {
    linknumber: 0
  }
  ip_version: ipv4-6
  link_mode: passive
  secauth: on
  version: 2
}
