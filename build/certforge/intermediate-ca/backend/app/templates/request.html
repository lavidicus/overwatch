<!DOCTYPE html>
<html>
<head>
    <title>Request Certificate - CertForge</title>
</head>
<body>
    <h1>Request Certificate</h1>
    <form method="POST">
        <label>Common Name (CN):</label><br>
        <input type="text" name="common_name" required><br><br>

        <label>Organization:</label><br>
        <input type="text" name="organization" required><br><br>

        <label>Key Size:</label><br>
        <select name="key_size">
            <option value="2048">2048-bit (default)</option>
            <option value="4096">4096-bit</option>
        </select><br><br>

        <label>Validity (days):</label><br>
        <input type="number" name="validity_days" value="365"><br><br>

        <button type="submit">Generate Certificate</button>
    </form>
</body>
</html>
